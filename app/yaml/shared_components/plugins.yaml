  - # ====== Custom Attribute: Custom Styles =====================
    id: 130382226724372720886
    identification: 
      static-id: attribute_03
      attribute: 3
      name: Custom Styles
      scope: Component

    layout: 
      sequence: 20

    settings: 
      type: Textarea
