- # ====== Region: Migration Details ===========================
  id: 71037927717110921
  identification: 
    name: Migration Details
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select apex_version
            ,rn_type
            ,rn_chapter_no
            ,rn_chapter_name
            ,rn_chapter_text
            ,rn_chapter_link
            ,page_id
            ,page_name
            ,component_type
            ,component_name
            ,coalesce(plsql_code_vc2
                     ,coalesce(js_code_vc2
                              ,css_code_vc2)) code
            ,migration_priority
            ,round(migration_effort_in_days,2) migration_effort_in_days
      from av_migration_pkg.ptf_effort_calculation(i_app_id               => :P0_APP_ID
                                                  ,i_apex_versions        => :P750_APEX_VERSIONS
                                                  ,i_migration_priorities => :P750_MIGRATION_PRIORITIES
                                                  ,i_migration_types      => :P750_MIGRATION_TYPES
                                                  ,i_show_only_findings   => :P750_SHOW_ONLY_FINDINGS)
      order by apex_version
              ,replace(rn_chapter_no
                      ,'.'
                      ,'')
              ,page_id
              ,component_name
      
    page-items-to-submit: 
    - P0_APP_ID
    - P750_APEX_VERSIONS
    - P750_MIGRATION_PRIORITIES
    - P750_MIGRATION_TYPES
    - P750_SHOW_ONLY_FINDINGS

