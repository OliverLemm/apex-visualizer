- # ====== Region: Migration Effort ============================
  id: 71036156686110903
  identification: 
    name: Migration Effort
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select 
       apex_version
      ,rn_type
      ,rn_chapter_no
      ,rn_chapter_name
      ,migration_priority
      ,count(1) amount_of_objects
      ,round(sum(migration_effort_in_days)
            ,3) migration_effort_in_days
      from av_migration_pkg.ptf_effort_calculation(i_app_id               => :P0_APP_ID
                                                  ,i_apex_versions        => :P760_APEX_VERSIONS
                                                  ,i_migration_priorities => :P760_MIGRATION_PRIORITIES)
        group by apex_version
                ,rn_type
                ,rn_chapter_no
                ,rn_chapter_name
                ,migration_priority
        order by rn_type
                ,apex_version
                ,rn_chapter_no 
    page-items-to-submit: 
    - P0_APP_ID
    - P760_APEX_VERSIONS
    - P760_MIGRATION_PRIORITIES

